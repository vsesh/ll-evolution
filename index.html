<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution Simulation</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgb(28, 26, 38);
    }

    #canvas {
      display: block;
      touch-action: none;
    }

    #erase-cursor {
      position: fixed;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 200;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="erase-cursor"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
