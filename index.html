<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Hill</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgb(28, 26, 38);
    }

    #canvas {
      display: block;
      touch-action: none;
    }

    #erase-cursor {
      position: fixed;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 200;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #0a0807;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-eye {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .loader-eye::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50% 0 50% 0;
      transform: rotate(45deg);
      border: 2px solid rgba(180, 60, 30, 0.7);
      animation: blink 1.4s ease-in-out infinite;
    }

    .loader-eye::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: rgba(180, 60, 30, 0.9);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { transform: rotate(45deg) scaleY(1); opacity: 0.7; }
      50% { transform: rotate(45deg) scaleY(0.15); opacity: 0.4; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.5); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="erase-cursor"></div>
  <div id="loader"><div class="loader-eye"></div></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
