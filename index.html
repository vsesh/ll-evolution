<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    #canvas {
      display: block;
      touch-action: none;
    }

    #erase-cursor {
      position: fixed;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 200;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-eye {
      width: 60px;
      height: 60px;
      position: relative;
      animation: eye-breathe 3s ease-in-out infinite;
    }

    .loader-eye::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50% 0 50% 0;
      transform: rotate(45deg);
      border: 2px solid rgba(180, 60, 30, 0.7);
    }

    .loader-eye::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: rgba(180, 60, 30, 0.9);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes eye-breathe {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    @media (orientation: portrait) and (max-width: 1024px) {
      body {
        width: 100dvh;
        height: 100dvw;
        transform-origin: top left;
        transform: rotate(90deg) translateY(-100%);
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="erase-cursor"></div>
  <div id="loader"><div class="loader-eye"></div></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
